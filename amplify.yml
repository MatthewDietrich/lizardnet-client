version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "=== Env vars containing VITE or UPLOAD (values masked) ==="
        - env | grep -iE "vite|upload" | sed 's/=.*/=***/' || echo "(none found)"
        - echo "=== Searching SSM for UPLOAD_TOKEN ==="
        - aws ssm describe-parameters --parameter-filters "Key=Name,Option=Contains,Values=UPLOAD_TOKEN" --query "Parameters[*].Name" --output text 2>&1 || echo "(SSM query failed - check build role permissions)"
        - |
          if [ -z "$VITE_UPLOAD_TOKEN" ]; then
            echo "ERROR: VITE_UPLOAD_TOKEN is not set — check the output above for the correct SSM path or env var name"
            exit 1
          fi
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
